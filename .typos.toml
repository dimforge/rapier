# Corrections take the form of a key/value pair. The key is the incorrect word
# and the value is the correct word. If the key and value are the same, the
# word is treated as always correct. If the value is an empty string, the word
# is treated as always incorrect.

[files]
extend-exclude = [
    ".git/",
    # The website's static assets are generated/vendored: prebuilt demo
    # bundles, generated TypeDoc HTML, and exported SVGs — not authored prose.
    "website/static/",
    "website/.yarn/",
]
ignore-hidden = false

[default]
extend-ignore-re = [
    "\\bPolygon::PN\\b",
]

# Case sensitive, matches entire word.
[default.extend-identifiers]
anc_color = "anc_color"
rady = "rady"
iit_softfoot = "iit_softfoot"
FoV = "FoV"
# Shepperd's method: named after S. W. Shepperd (quaternion extraction).
Shepperd = "Shepperd"
# Short local identifiers in the Python bindings/tests: `ba` (body a, paired
# with `bb`) and `typ` (a "type" value — `type` is reserved in Rust/Python).
ba = "ba"
typ = "typ"
# Template mesh data in the testbed instancer: `tpos`/`tnrm`/`tidx`
# (template positions/normals/indices). Only `tpos` collides with a word.
tpos = "tpos"

# Case insensitive, matches inside word.
[default.extend-words]
bellow = "below"
toi = "toi"
